info:
  name: Créer une adresse
  type: http
  seq: 1

http:
  method: POST
  url: http://localhost:3000/api/addresses
  body:
    type: json
    data: |-
      {
        "searchWord": "Lyon",
        "name": "Maison",
        "description": "Mon adresse à Lyon"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
