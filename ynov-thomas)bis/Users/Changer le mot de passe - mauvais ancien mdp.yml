info:
  name: Changer le mot de passe - mauvais ancien mdp
  type: http
  seq: 6

http:
  method: PUT
  url: http://localhost:3000/api/users/password
  body:
    type: json
    data: |-
      {
        "currentPassword": "wrongpassword",
        "newPassword": "newpassword123"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

tests:
  assert:
    - status: 400
    - body.message: contains "wrong password"
