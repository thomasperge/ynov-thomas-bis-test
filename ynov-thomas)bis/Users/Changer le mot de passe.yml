info:
  name: Changer le mot de passe
  type: http
  seq: 4

http:
  method: PUT
  url: http://localhost:3000/api/users/password
  body:
    type: json
    data: |-
      {
        "currentPassword": "supersecret",
        "newPassword": "newpassword123"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

tests:
  assert:
    - status: 200
    - body.message: contains "password updated"
